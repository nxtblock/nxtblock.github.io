<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- 3秒后重定向到目标网址 -->
  <meta http-equiv="refresh" content="3;url=http://us-lax-3.lcf.im:40803/">
  <title>Loading...</title>
  <style>
    /* 黑色背景，居中显示内容 */
    body {
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    /* 加载动画效果 */
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top: 5px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* 加载文字样式 */
    .loading-text {
      margin-top: 20px;
      color: #fff;
      font-size: 20px;
      text-align: center;
    }
    .container {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="loading-text">建在中...</div>
  </div>
</body>
</html>
